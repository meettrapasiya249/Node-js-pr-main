<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Store</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <h1> Book Store</h1>
    
    <div class="container">
        <div class="form-section">
            <h2 id="formTitle">Add Book</h2>
            <div class="input-group">
                <input id="title" class="input-field" placeholder="Book Title" />
                <input id="author" class="input-field" placeholder="Author Name" />
                <input id="price" class="input-field" placeholder="Price" type="number" />
            </div>
            <div class="button-group">
                <button class="btn btn-primary" onclick="saveBook()"> Save Book</button>
                <button class="btn btn-secondary" onclick="resetForm()">↺ Cancel</button>
            </div>
        </div>
        
        <div class="books-section">
            <h2> All Books</h2>
            <ul id="books"></ul>
        </div>
    </div>

    <script>
        let editId = null;
        let statusTimeout;

        async function showStatus(message, type) {
            const existingStatus = document.querySelector('.status-indicator');
            if (existingStatus) existingStatus.remove();
            
            const status = document.createElement('div');
            status.className = `status-indicator status-${type}`;
            status.textContent = message;
            document.body.appendChild(status);
            
            clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => {
                status.remove();
            }, 3000);
        }

        async function saveBook() {
            const book = {
                title: title.value,
                author: author.value,
                price: parseFloat(price.value)
            };

            try {
                if (editId) {
                    await fetch(`/books/${editId}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(book)
                    });
                    showStatus('Book updated successfully!', 'edit');
                } else {
                    await fetch("/books", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(book)
                    });
                    showStatus('Book added successfully!', 'success');
                }
            } catch (error) {
                showStatus('Error saving book', 'error');
            }

            resetForm();
            loadBooks();
        }

        async function loadBooks() {
            try {
                const res = await fetch("/books");
                const books = await res.json();
                const booksList = document.getElementById("books");

                if (books.length === 0) {
                    booksList.innerHTML = '<div class="empty-state">No books in the collection. Add your first book!</div>';
                    return;
                }

                booksList.innerHTML = books
                    .map(book => `
                        <li>
                            <div class="book-info">
                                <div class="book-title">${book.title}</div>
                                <div class="book-details">by ${book.author}</div>
                                <div class="book-price">$${book.price.toFixed(2)}</div>
                            </div>
                            <div class="action-buttons">
                                <button class="action-btn edit-btn" onclick="editBook('${book._id}', '${book.title}', '${book.author}', ${book.price})">
                                     ↺ Edit
                                </button>
                                <button class="action-btn delete-btn" onclick="deleteBook('${book._id}')">
                                     Delete
                                </button>
                            </div>
                        </li>
                    `)
                    .join("");
            } catch (error) {
                console.error('Error loading books:', error);
            }
        }

        function editBook(id, titleVal, authorVal, priceVal) {
            editId = id;
            title.value = titleVal;
            author.value = authorVal;
            price.value = priceVal;
            
            const formTitle = document.getElementById("formTitle");
            formTitle.innerText = " Edit Book";
            formTitle.classList.add('editing');
            
            showStatus('Editing book...', 'edit');
            title.focus();
        }

        async function deleteBook(id) {
            if (confirm('Are you sure you want to delete this book?')) {
                try {
                    await fetch(`/books/${id}`, { method: "DELETE" });
                    showStatus('Book deleted!', 'success');
                    loadBooks();
                } catch (error) {
                    showStatus('Error deleting book', 'error');
                }
            }
        }

        function resetForm() {
            editId = null;
            title.value = "";
            author.value = "";
            price.value = "";
            
            const formTitle = document.getElementById("formTitle");
            formTitle.innerText = " Add Book";
            formTitle.classList.remove('editing');
        }

        loadBooks();
    </script>
</body>
</html>
